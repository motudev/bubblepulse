services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: bubblepulse
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bubblepulse"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nlp_service:
    image: ghcr.io/motudev/bubblepulse-nlp:latest
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  backend:
    image: ghcr.io/motudev/bubblepulse-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID} 
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET}
      OIDC_REDIRECT_URL: ${OIDC_REDIRECT_URL}
      FRONTEND_URL: ${FRONTEND_URL:-}
      SLACK_SIGNING_SECRET: ${SLACK_SIGNING_SECRET}
      SLACK_BOT_TOKEN: ${SLACK_BOT_TOKEN}
      TENANCY_MODE: ${TENANCY_MODE:-pooled}
      NLP_SERVICE_URL: http://nlp_service:8090 
    depends_on:
      postgres:
        condition: service_healthy
      nlp_service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  frontend:
    image: ghcr.io/motudev/bubblepulse-frontend:latest
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
      - caddynet

networks:
  internal:
    driver: bridge
  caddynet:
    external: true

volumes:
  postgres_data:
